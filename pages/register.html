<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWorld - Register</title>
    <link rel="stylesheet" href="../css/register.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F5E6D3] flex items-center justify-center min-h-screen">

  <!-- CARD -->
  <div class="bg-white border border-[#D8C3AF] shadow-lg rounded-2xl w-[90%] max-w-md p-8">

    <!-- TITLE -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-[#6B3518]">📚 BookWorld</h1>
      <p class="text-[#8A4B2A] text-sm mt-1">Create your account</p>
    </div>

    <!-- FORM -->
    <form id="registerForm">

      <!-- NAME -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-[#6B3518] mb-1">Full Name</label>
        <div class="flex items-center bg-[#EEDDC8] border border-[#D8C3AF] rounded-lg px-3 py-2">
          <i class="fa-solid fa-user text-[#8A4B2A] mr-2"></i>
          <input type="text" id="name" placeholder="Enter your name"
            class="w-full bg-transparent outline-none text-sm text-[#6B3518]">
        </div>
      </div>

      <!-- EMAIL -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-[#6B3518] mb-1">Email</label>
        <div class="flex items-center bg-[#EEDDC8] border border-[#D8C3AF] rounded-lg px-3 py-2">
          <i class="fa-solid fa-envelope text-[#8A4B2A] mr-2"></i>
          <input type="email" id="email" placeholder="Enter your email"
            class="w-full bg-transparent outline-none text-sm text-[#6B3518]">
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-[#6B3518] mb-1">Password</label>
        <div class="flex items-center bg-[#EEDDC8] border border-[#D8C3AF] rounded-lg px-3 py-2">
          <i class="fa-solid fa-lock text-[#8A4B2A] mr-2"></i>
          <input type="password" id="password" placeholder="Enter password"
            class="w-full bg-transparent outline-none text-sm text-[#6B3518]">
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-[#6B3518] mb-1">Confirm Password</label>
        <div class="flex items-center bg-[#EEDDC8] border border-[#D8C3AF] rounded-lg px-3 py-2">
          <i class="fa-solid fa-lock text-[#8A4B2A] mr-2"></i>
          <input type="password" id="confirmPassword" placeholder="Confirm password"
            class="w-full bg-transparent outline-none text-sm text-[#6B3518]">
        </div>
      </div>

      <!-- BUTTON -->
      <button type="submit"
        class="w-full bg-[#E86A17] text-white py-2 rounded-lg font-semibold hover:bg-[#F39C4A] transition">
        Register
      </button>

    </form>

    <!-- LOGIN LINK -->
    <p class="text-center text-sm text-[#8A4B2A] mt-6">
      Already have an account?
      <a href="./login.html" class="text-[#E86A17] font-medium hover:text-[#F39C4A]">
        Login
      </a>
    </p>

  </div>
    <script src="./js/register.js"></script>
</html>
